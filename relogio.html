<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relógio Analógico com Calendário</title>
  <style>
    canvas {
      background: #f0f0f0;
      display: block;
      margin: 50px auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="relogio" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("relogio");
    const ctx = canvas.getContext("2d");
    const raio = canvas.width / 2 - 20;
    let corFundo = "#f0f0f0";
    let calendarioDireita = true;
    const cores = ["#f0f0f0", "#d0f0d0", "#d0d0f0"];
    let corIndex = 0;

    const botao = { x: canvas.width - 80, y: canvas.height - 40, w: 60, h: 25 };

    function desenharRelogio() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(canvas.width/2, canvas.height/2);

      ctx.beginPath();
      ctx.arc(0, 0, raio, 0, 2 * Math.PI);
      ctx.stroke();

      desenharMarcas();
      desenharNumeros();

      const agora = new Date();
      const horas = agora.getHours() % 12;
      const minutos = agora.getMinutes();
      const segundos = agora.getSeconds();

      desenharPonteiro(((horas + minutos/60) * 30) * Math.PI/180, raio * 0.5, 6);
      desenharPonteiro(((minutos + segundos/60) * 6) * Math.PI/180, raio * 0.75, 4);
      desenharPonteiro((segundos * 6) * Math.PI/180, raio * 0.9, 2, "red");

      desenharCalendario();
      ctx.restore();

      desenharBotao();
      requestAnimationFrame(desenharRelogio);
    }

    function desenharPonteiro(angulo, comprimento, largura, cor="black") {
      ctx.save();
      ctx.rotate(angulo);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -comprimento);
      ctx.lineWidth = largura;
      ctx.strokeStyle = cor;
      ctx.stroke();
      ctx.restore();
    }

    function desenharNumeros() {
      ctx.font = "20px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const agora = new Date();
      const segundos = agora.getSeconds();
      const anguloSegundos = (segundos * 6) * Math.PI / 180;

      for (let num = 1; num <= 12; num++) {
        const angulo = (num * 30) * Math.PI / 180;
        const x = Math.cos(angulo - Math.PI/2) * (raio - 40);
        const y = Math.sin(angulo - Math.PI/2) * (raio - 40);

        ctx.save();
        ctx.fillStyle = Math.abs(angulo - anguloSegundos) < 0.01 ? "blue" : "black";
        ctx.fillText(num.toString(), x, y);
        ctx.restore();
      }
    }

    function desenharMarcas() {
      const agora = new Date();
      const segundos = agora.getSeconds();
      const anguloSegundos = (segundos * 6) * Math.PI / 180;

      for (let i = 0; i < 60; i++) {
        const angulo = (i * 6) * Math.PI / 180;
        const x1 = Math.cos(angulo - Math.PI/2) * (raio - 5);
        const y1 = Math.sin(angulo - Math.PI/2) * (raio - 5);
        const x2 = Math.cos(angulo - Math.PI/2) * (raio - 15);
        const y2 = Math.sin(angulo - Math.PI/2) * (raio - 15);

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);

        if (Math.abs(angulo - anguloSegundos) < 0.01) {
          ctx.strokeStyle = "blue";
          ctx.lineWidth = 2;
        } else {
          ctx.strokeStyle = "black";
          ctx.lineWidth = (i % 5 === 0) ? 2 : 1;
        }
        ctx.stroke();
      }
    }

    function desenharCalendario() {
      const agora = new Date();
      const dia = agora.getDate();
      const mes = agora.getMonth() + 1;

      ctx.save();
      const posX = calendarioDireita ? raio * 0.5 : -raio * 0.5;
      ctx.translate(posX, -10);

     
      ctx.scale(1.2, 1.2);

      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "#000";
      ctx.fillRect(-25, -15, 50, 25);
      ctx.strokeRect(-25, -15, 50, 25);

      ctx.fillStyle = "#000";
      ctx.font = "14px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(`${dia}/${mes}`, 0, 0);
      ctx.restore();
    }

    function desenharBotao() {
      ctx.save();
      ctx.fillStyle = "#ccc";
      ctx.strokeStyle = "#000";
      ctx.fillRect(botao.x, botao.y, botao.w, botao.h);
      ctx.strokeRect(botao.x, botao.y, botao.w, botao.h);

      ctx.fillStyle = "#000";
      ctx.font = "12px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("Cor", botao.x + botao.w/2, botao.y + botao.h/2);
      ctx.restore();
    }

    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      const posX = calendarioDireita ? raio * 0.5 : -raio * 0.5;
      const calX = canvas.width/2 + posX;
      const calY = canvas.height/2 - 10;

      if (clickX > calX-25 && clickX < calX+25 && clickY > calY-15 && clickY < calY+10) {
        calendarioDireita = !calendarioDireita;
      }

      if (clickX > botao.x && clickX < botao.x+botao.w && clickY > botao.y && clickY < botao.y+botao.h) {
        corIndex = (corIndex + 1) % cores.length;
        corFundo = cores[corIndex];
        canvas.style.background = corFundo;
      }
    });

    desenharRelogio();
  </script>
</body>
</html>
